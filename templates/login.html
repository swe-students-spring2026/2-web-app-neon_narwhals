<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>MealPrep - Login</title>
  <link rel="stylesheet" href="/static/login.css" />
</head>
<body>
  <div class="status-bar">
    <span>9:41</span>
  </div>

  <div class="page-header">Food Planner</div>

  <div class="content">
  <h2 style="margin-bottom: 16px;"> Create Account</h2> 
    <div id="new-user-form" class="tab-content active">
      <form action="/create_user" method="POST">
        <div class="form-group">
          <label for="new-username">Username</label>
          <input type="text" id="new-username" name="username" placeholder="Enter your username" maxlength="50" required />
        </div>
        <div class="form-group">
          <label for="new-password">Password</label>
          <input type="password" id="new-password" name="password" placeholder="Enter your password" maxlength="50" required />
        </div>
        <button type="submit" class="btn-add-item">Create Account</button>
        <a href="/existing_user" class="btn-add-item">Existing User</a>
      </form>
    </div>

  </div>

</body>
</html>
