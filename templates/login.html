<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>MealPrep - Login</title>
  <link rel="stylesheet" href="/login.css" />
</head>
<body>
  <div class="status-bar">
    <span>9:41</span>
  </div>

  <div class="page-header">Food Planner</div>

  <div class="content">

    <div class="tab-container">
      <button class="tab-button active" onclick="showForm('new')">New User</button>
      <button class="tab-button" onclick="showForm('existing')">Existing User</button>
    </div>

    <div id="new-user-form" class="tab-content active">
      <form action="/create_user" method="POST">
        <div class="form-group">
          <label for="new-username">Username</label>
          <input type="text" id="new-username" name="username" placeholder="Enter your username" maxlength="50" required />
        </div>
        <button type="submit" class="btn-add-item">Create Account</button>
      </form>
    </div>

    <div id="existing-user-form" class="tab-content">
      {% for user in users %}
      <form action="/login_user" method="POST">
        <input type="hidden" name="username" value="{{ user }}" />
        <button type="submit" class="btn-user">{{ user }}</button>
      </form>
      {% else %}
      <div class="empty-state">No users found. Create a new account first.</div>
      {% endfor %}
    </div>

  </div>

  <script>
    function showForm(formType) {
      document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      if (formType === 'new') {
        document.querySelector('.tab-button:first-child').classList.add('active');
        document.getElementById('new-user-form').classList.add('active');
      } else {
        document.querySelector('.tab-button:last-child').classList.add('active');
        document.getElementById('existing-user-form').classList.add('active');
      }
    }
  </script>
</body>
</html>
