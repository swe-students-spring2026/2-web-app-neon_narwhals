<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>MealPrep - Login</title>
  <link rel="stylesheet" href="/static/existinguser.css" />
</head>
<body>
  <div class="status-bar">
    <span>9:41</span>
  </div>

  <div class="page-header">Food Planner </div>

  <div class="content">
  <h2 style="margin-bottom: 16px;">User Login</h2> 
    <div id="existing-user-form" class="tab-content active">
      <form action="/login_user" method="POST">
        <div class="form-group">
          <label for="old-username">Username</label>
          <input type="text" id="old-username" name="username" placeholder="Enter your username" maxlength="50" required />
        </div>
        <div class="form-group">
          <label for="old-password">Password</label>
          <input type="password" id="old-password" name="password" placeholder="Enter your password" maxlength="50" required />
        </div>
        {%if error%}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        <button type="submit" class="btn-add-item">Login</button>
        <a href="/login" class="btn-add-item">Create Account</a>
      </form>
    </div>

  </div>
</body>
</html>
