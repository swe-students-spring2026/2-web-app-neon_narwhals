<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery History</title>
    <!-- use the same bottom-nav styles as week/day/home -->
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
    <div class="status-bar">
        <span>9:41</span>
        <span>●●●</span>
    </div>
    <div class="page-header">Grocery History</div>

    <!--WEEK BLOCK -->
    <div class="history-container">

    {% for week in history %}
    <div class="week-block">
        <h3 class="week-title">Week of {{ week.week }}</h3>

        <div class="table-header">
        <span>Food Item</span>
        <span>Date Added</span>
        <span>Amount</span>
        </div>

        {% for item in week["items"] %}
        <div class="table-row">
        <span>{{ item.name }}</span>
        <span>{{ item.date_added }}</span>
        <span>{{ item.amount }}</span>
        </div>
        {% endfor %}
    </div>
    {% endfor %}

    </div>
    <!--duplicates-->
    <!-- <div class="week-block">
        <h3 class="week-title">Week of 10/1/2024</h3>
        <div class="table-header">
            <span>Food Item</span>
            <span>Date Added</span>
            <span>Amount</span>
        </div>
        <div class="table-row">
            <span>Milk</span>
            <span>10/2/2024</span>
            <span>1 gallon</span>
        </div>
    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="/week" class="nav-tab">Week</a>
        <a href="/day" class="nav-tab">Day</a>
        <a href="/grocery-list" class="nav-tab">Grocery</a>
        <a href="/grocery-history" class="nav-tab active">History</a>
    </nav>
</body>
</html>
